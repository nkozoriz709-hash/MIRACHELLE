<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | MIRACHELLE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #FDFCF9;
            color: #1E1E1E;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 32px 40px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .admin-header h1 {
            font-size: 2rem;
            font-weight: 500;
        }
        .logout-btn {
            background: #1E1E1E;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 2px solid #F0EBE3;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            color: #8B7A6B;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #B28B6F;
            border-bottom: 2px solid #B28B6F;
            margin-bottom: -2px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .add-btn {
            background: #B28B6F;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .item-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #F0EBE3;
            transition: all 0.2s;
        }
        .item-card:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .item-card h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
        }
        .item-card p {
            color: #6B5A4E;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .edit-btn, .delete-btn {
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            border: none;
        }
        .edit-btn {
            background: #F0EBE3;
            color: #1E1E1E;
        }
        .delete-btn {
            background: #FDF5F5;
            color: #D9534F;
            border: 1px solid #FFDCDC;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
        }
        .modal-content h2 {
            margin-bottom: 24px;
        }
        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #E0D8D0;
            border-radius: 12px;
            font-family: inherit;
        }
        .modal-content textarea {
            min-height: 80px;
        }
        .benefits-list {
            margin-bottom: 16px;
        }
        .benefit-item {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .benefit-item input {
            flex: 1;
            margin-bottom: 0;
        }
        .add-benefit {
            background: #F0EBE3;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .save-btn, .cancel-btn {
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
        }
        .save-btn {
            background: #B28B6F;
            color: white;
        }
        .cancel-btn {
            background: #F0EBE3;
            color: #1E1E1E;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FDFCF9;
        }
        .login-box {
            background: white;
            padding: 48px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 16px 0;
            border: 1px solid #E0D8D0;
            border-radius: 12px;
        }
        .login-box button {
            background: #B28B6F;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
        }
        .error {
            color: #D9534F;
            margin-top: 12px;
        }
        @media (max-width: 768px) {
            .admin-container {
                padding: 60px 20px 30px;
            }
        }
    </style>
</head>
<body>
<div id="loginSection" class="login-container">
    <div class="login-box">
        <h2>🔐 Вход в админ-панель</h2>
        <input type="password" id="adminPassword" placeholder="Введите пароль">
        <button onclick="checkLogin()">Войти</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="adminSection" style="display: none;">
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> Админ-панель MIRACHELLE</h1>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('products')">📦 Товары</button>
            <button class="tab-btn" onclick="switchTab('reviews')">💬 Отзывы</button>
        </div>

        <div id="productsTab" class="tab-content active">
            <button class="add-btn" onclick="openProductModal()">+ Добавить товар</button>
            <div id="productsList" class="items-grid"></div>
        </div>

        <div id="reviewsTab" class="tab-content">
            <button class="add-btn" onclick="openReviewModal()">+ Добавить отзыв</button>
            <div id="reviewsList" class="items-grid"></div>
        </div>
    </div>
</div>

<div id="itemModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Добавить товар</h2>
        <input type="text" id="productName" placeholder="Название товара">
        <input type="text" id="productVolume" placeholder="Объём (например: Объём: 30 мл)">
        <textarea id="productShortDesc" placeholder="Краткое описание"></textarea>
        <textarea id="productDescription" placeholder="Полное описание"></textarea>
        <input type="number" id="productPriceRub" placeholder="Цена в ₽">
        <input type="number" id="productPriceByn" placeholder="Цена в Br">
        <input type="text" id="productImage" placeholder="URL изображения">
        <textarea id="productIngredients" placeholder="Состав"></textarea>
        
        <div>
            <label>Ключевые преимущества:</label>
            <div id="benefitsContainer" class="benefits-list"></div>
            <button type="button" class="add-benefit" onclick="addBenefitField()">+ Добавить преимущество</button>
        </div>
        
        <div class="modal-buttons">
            <button class="save-btn" onclick="saveItem()">Сохранить</button>
            <button class="cancel-btn" onclick="closeItemModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const PRODUCTS_BIN_ID = '69d0eadcaaba882197c3930d';
    const REVIEWS_BIN_ID = '69d0eb1136566621a87acdca';
    const API_KEY = '$2a$10$Q7f3EYrK6RyG37RtKdGbEuinxBtsHPBttKVALqQNjIBNjmub5W2y2';
    const ADMIN_PASSWORD = 'admin123';

    let products = [];
    let reviews = [];
    let currentEditId = null;
    let currentType = 'products';
    let benefitsArray = [];

    // ========== API ЗАПРОСЫ ==========
    async function loadData(type) {
        const url = type === 'products' 
            ? `https://api.jsonbin.io/v3/b/${PRODUCTS_BIN_ID}`
            : `https://api.jsonbin.io/v3/b/${REVIEWS_BIN_ID}`;
        
        try {
            const response = await fetch(url, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await response.json();
            return data.record || [];
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            return [];
        }
    }

    async function saveData(type, data) {
        const url = type === 'products'
            ? `https://api.jsonbin.io/v3/b/${PRODUCTS_BIN_ID}`
            : `https://api.jsonbin.io/v3/b/${REVIEWS_BIN_ID}`;
        
        try {
            await fetch(url, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(data)
            });
            return true;
        } catch (error) {
            console.error('Ошибка сохранения:', error);
            return false;
        }
    }

    async function refreshProducts() {
        products = await loadData('products');
        renderProductsList();
    }

    async function refreshReviews() {
        reviews = await loadData('reviews');
        renderReviewsList();
    }

    // ========== ОТОБРАЖЕНИЕ ==========
    function renderProductsList() {
        const container = document.getElementById('productsList');
        if (!container) return;
        
        if (!products || products.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">Нет товаров. Добавьте первый!</div>';
            return;
        }
        
        container.innerHTML = products.map(prod => `
            <div class="item-card">
                <h3>${escapeHtml(prod.name)}</h3>
                <p>💰 ${prod.priceRub} ₽ / ${prod.priceByn} Br</p>
                <p>📦 ${prod.volume || 'Нет объёма'}</p>
                <p>📝 ${prod.shortDesc ? prod.shortDesc.substring(0, 60) + '...' : 'Нет описания'}</p>
                <div class="card-actions">
                    <button class="edit-btn" onclick="editProduct(${prod.id})">✏️ Редактировать</button>
                    <button class="delete-btn" onclick="deleteProduct(${prod.id})">🗑️ Удалить</button>
                </div>
            </div>
        `).join('');
    }

    function renderReviewsList() {
        const container = document.getElementById('reviewsList');
        if (!container) return;
        
        if (!reviews || reviews.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">Нет отзывов. Добавьте первый!</div>';
            return;
        }
        
        container.innerHTML = reviews.map(rev => `
            <div class="item-card">
                <h3>👤 ${escapeHtml(rev.name)}</h3>
                <p>💬 "${rev.text ? rev.text.substring(0, 80) + '...' : ''}"</p>
                ${rev.imgUrl ? `<p>🖼️ Есть фото</p>` : ''}
                ${rev.videoUrl ? `<p>📹 Есть видео</p>` : ''}
                <div class="card-actions">
                    <button class="edit-btn" onclick="editReview(${rev.id})">✏️ Редактировать</button>
                    <button class="delete-btn" onclick="deleteReview(${rev.id})">🗑️ Удалить</button>
                </div>
            </div>
        `).join('');
    }

    // ========== ТОВАРЫ ==========
    function openProductModal(product = null) {
        currentType = 'products';
        currentEditId = product ? product.id : null;
        
        document.getElementById('modalTitle').textContent = product ? 'Редактировать товар' : 'Добавить товар';
        document.getElementById('productName').value = product ? product.name : '';
        document.getElementById('productVolume').value = product ? product.volume : '';
        document.getElementById('productShortDesc').value = product ? product.shortDesc : '';
        document.getElementById('productDescription').value = product ? product.description : '';
        document.getElementById('productPriceRub').value = product ? product.priceRub : '';
        document.getElementById('productPriceByn').value = product ? product.priceByn : '';
        document.getElementById('productImage').value = product ? product.image : '';
        document.getElementById('productIngredients').value = product ? product.ingredients : '';
        
        benefitsArray = product && product.benefits ? [...product.benefits] : [];
        renderBenefitsFields();
        
        document.getElementById('itemModal').style.display = 'flex';
    }

    function renderBenefitsFields() {
        const container = document.getElementById('benefitsContainer');
        container.innerHTML = '';
        benefitsArray.forEach((benefit, index) => {
            container.innerHTML += `
                <div class="benefit-item">
                    <input type="text" value="${escapeHtml(benefit)}" onchange="updateBenefit(${index}, this.value)">
                    <button onclick="removeBenefit(${index})" style="background:#FDF5F5; border:none; border-radius:20px; padding:0 12px; cursor:pointer;">✖️</button>
                </div>
            `;
        });
        if (benefitsArray.length === 0) {
            container.innerHTML = '<div style="color:#8B7A6B; margin-bottom:12px;">Нет преимуществ. Добавьте ниже</div>';
        }
    }

    function addBenefitField() {
        benefitsArray.push('');
        renderBenefitsFields();
    }

    function updateBenefit(index, value) {
        benefitsArray[index] = value;
    }

    function removeBenefit(index) {
        benefitsArray.splice(index, 1);
        renderBenefitsFields();
    }

    async function saveItem() {
        if (currentType === 'products') {
            const productData = {
                id: currentEditId || Date.now(),
                name: document.getElementById('productName').value,
                volume: document.getElementById('productVolume').value,
                shortDesc: document.getElementById('productShortDesc').value,
                description: document.getElementById('productDescription').value,
                priceRub: parseInt(document.getElementById('productPriceRub').value) || 0,
                priceByn: parseInt(document.getElementById('productPriceByn').value) || 0,
                image: document.getElementById('productImage').value,
                ingredients: document.getElementById('productIngredients').value,
                benefits: benefitsArray.filter(b => b.trim() !== '')
            };
            
            if (currentEditId) {
                const index = products.findIndex(p => p.id === currentEditId);
                if (index !== -1) products[index] = productData;
            } else {
                products.push(productData);
            }
            
            await saveData('products', products);
            await refreshProducts();
        }
        
        closeItemModal();
    }

    async function deleteProduct(id) {
        if (confirm('Удалить этот товар?')) {
            products = products.filter(p => p.id !== id);
            await saveData('products', products);
            await refreshProducts();
        }
    }

    function editProduct(id) {
        const product = products.find(p => p.id === id);
        if (product) openProductModal(product);
    }

    // ========== ОТЗЫВЫ ==========
    function openReviewModal(review = null) {
        currentType = 'reviews';
        currentEditId = review ? review.id : null;
        
        document.getElementById('modalTitle').textContent = review ? 'Редактировать отзыв' : 'Добавить отзыв';
        
        const modalContent = document.querySelector('#itemModal .modal-content');
        if (!reviewModalCreated) {
            modalContent.innerHTML = `
                <h2 id="modalTitle">Добавить отзыв</h2>
                <input type="text" id="reviewName" placeholder="Имя">
                <textarea id="reviewText" placeholder="Текст отзыва"></textarea>
                <input type="text" id="reviewImgUrl" placeholder="URL фото (необязательно)">
                <input type="text" id="reviewVideoUrl" placeholder="URL видео (необязательно)">
                <div class="modal-buttons">
                    <button class="save-btn" onclick="saveReviewItem()">Сохранить</button>
                    <button class="cancel-btn" onclick="closeItemModal()">Отмена</button>
                </div>
            `;
            reviewModalCreated = true;
        }
        
        if (review) {
            setTimeout(() => {
                document.getElementById('reviewName').value = review.name || '';
                document.getElementById('reviewText').value = review.text || '';
                document.getElementById('reviewImgUrl').value = review.imgUrl || '';
                document.getElementById('reviewVideoUrl').value = review.videoUrl || '';
            }, 10);
        } else {
            setTimeout(() => {
                if (document.getElementById('reviewName')) document.getElementById('reviewName').value = '';
                if (document.getElementById('reviewText')) document.getElementById('reviewText').value = '';
                if (document.getElementById('reviewImgUrl')) document.getElementById('reviewImgUrl').value = '';
                if (document.getElementById('reviewVideoUrl')) document.getElementById('reviewVideoUrl').value = '';
            }, 10);
        }
        
        document.getElementById('itemModal').style.display = 'flex';
    }

    let reviewModalCreated = false;

    async function saveReviewItem() {
        const reviewData = {
            id: currentEditId || Date.now(),
            name: document.getElementById('reviewName').value,
            text: document.getElementById('reviewText').value,
            imgUrl: document.getElementById('reviewImgUrl').value,
            videoUrl: document.getElementById('reviewVideoUrl').value
        };
        
        if (currentEditId) {
            const index = reviews.findIndex(r => r.id === currentEditId);
            if (index !== -1) reviews[index] = reviewData;
        } else {
            reviews.push(reviewData);
        }
        
        await saveData('reviews', reviews);
        await refreshReviews();
        closeItemModal();
    }

    async function deleteReview(id) {
        if (confirm('Удалить этот отзыв?')) {
            reviews = reviews.filter(r => r.id !== id);
            await saveData('reviews', reviews);
            await refreshReviews();
        }
    }

    function editReview(id) {
        const review = reviews.find(r => r.id === id);
        if (review) openReviewModal(review);
    }

    // ========== ВИДЕО-ОТЗЫВЫ ==========
function openVideoReviewModal(review = null) {
    currentReviewType = 'video';
    currentEditId = review ? review.id : null;
    
    const modalContent = document.querySelector('#itemModal .modal-content');
    modalContent.innerHTML = `
        <h2 id="modalTitle">${review ? 'Редактировать видео-отзыв' : 'Добавить видео-отзыв'}</h2>
        <input type="text" id="reviewName" placeholder="Имя">
        <textarea id="reviewText" placeholder="Краткий текст отзыва (необязательно)"></textarea>
        <input type="text" id="reviewVideoUrl" placeholder="Ссылка на YouTube видео">
        <div class="video-url-help">
            🎬 Поддерживаются любые ссылки YouTube:<br>
            • Обычное видео: https://youtu.be/XXXXXXXXXXX или https://www.youtube.com/watch?v=XXXXXXXXXXX<br>
            • YouTube Shorts: https://youtube.com/shorts/XXXXXXXXXXX
        </div>
        <div class="modal-buttons">
            <button class="save-btn" onclick="saveReviewItem()">Сохранить</button>
            <button class="cancel-btn" onclick="closeItemModal()">Отмена</button>
        </div>
    `;
    
    if (review) {
        setTimeout(() => {
            document.getElementById('reviewName').value = review.name || '';
            document.getElementById('reviewText').value = review.text || '';
            document.getElementById('reviewVideoUrl').value = review.videoUrl || '';
        }, 10);
    }
    
    document.getElementById('itemModal').style.display = 'flex';
}

    // ========== ОБЩИЕ ФУНКЦИИ ==========
    function closeItemModal() {
        document.getElementById('itemModal').style.display = 'none';
        currentEditId = null;
        benefitsArray = [];
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        if (tab === 'products') {
            document.querySelector('.tab-btn').classList.add('active');
            document.getElementById('productsTab').classList.add('active');
            refreshProducts();
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('reviewsTab').classList.add('active');
            refreshReviews();
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== АВТОРИЗАЦИЯ ==========
    function checkLogin() {
        const password = document.getElementById('adminPassword').value;
        if (password === ADMIN_PASSWORD) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            refreshProducts();
            refreshReviews();
        } else {
            document.getElementById('loginError').textContent = 'Неверный пароль!';
        }
    }

    function logout() {
        document.getElementById('loginSection').style.display = 'flex';
        document.getElementById('adminSection').style.display = 'none';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').textContent = '';
    }

    // Восстанавливаем оригинальный modal для товаров
    function restoreProductModal() {
        const modalContent = document.querySelector('#itemModal .modal-content');
        if (!reviewModalCreated) return;
        
        modalContent.innerHTML = `
            <h2 id="modalTitle">Добавить товар</h2>
            <input type="text" id="productName" placeholder="Название товара">
            <input type="text" id="productVolume" placeholder="Объём (например: Объём: 30 мл)">
            <textarea id="productShortDesc" placeholder="Краткое описание"></textarea>
            <textarea id="productDescription" placeholder="Полное описание"></textarea>
            <input type="number" id="productPriceRub" placeholder="Цена в ₽">
            <input type="number" id="productPriceByn" placeholder="Цена в Br">
            <input type="text" id="productImage" placeholder="URL изображения">
            <textarea id="productIngredients" placeholder="Состав"></textarea>
            
            <div>
                <label>Ключевые преимущества:</label>
                <div id="benefitsContainer" class="benefits-list"></div>
                <button type="button" class="add-benefit" onclick="addBenefitField()">+ Добавить преимущество</button>
            </div>
            
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveItem()">Сохранить</button>
                <button class="cancel-btn" onclick="closeItemModal()">Отмена</button>
            </div>
        `;
        reviewModalCreated = false;
    }

    window.openProductModal = openProductModal;
    window.openReviewModal = openReviewModal;
    window.saveItem = saveItem;
    window.saveReviewItem = saveReviewItem;
    window.deleteProduct = deleteProduct;
    window.deleteReview = deleteReview;
    window.editProduct = editProduct;
    window.editReview = editReview;
    window.switchTab = switchTab;
    window.checkLogin = checkLogin;
    window.logout = logout;
