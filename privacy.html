    <script src="script.js"></script>
    <!-- Небольшой скрипт для мобильного меню и корзины -->
    <script>
        // Дублируем базовые функции из script.js для работы меню и корзины на этой странице
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        function updateCartUI() {
            const cartCountSpan = document.getElementById('cartCount');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (cartCountSpan) cartCountSpan.innerText = totalItems;
        }
        function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }
        window.addEventListener('load', () => { updateCartUI(); });
        const mobileBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelector('.nav-links');
        if (mobileBtn) { mobileBtn.addEventListener('click', () => { navLinks.classList.toggle('active'); }); }
        document.querySelectorAll('.nav-links a').forEach(link => { link.addEventListener('click', () => { navLinks.classList.remove('active'); }); });
        const cartIconBtn = document.getElementById('cartIconBtn');
        if(cartIconBtn) cartIconBtn.addEventListener('click', (e) => { e.preventDefault(); alert('Корзина доступна на главной странице'); });
    </script>
